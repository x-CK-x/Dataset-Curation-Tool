name: data-curation-tool
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip
  - sqlite
  - tk
  - ffmpeg
  - opencv
  - numpy
  - pillow>=10
  # Conda package name is pysoundfile; it provides the importable soundfile module.
  # Do not use a conda dependency named "soundfile" here; that is the PyPI name.
  - libsndfile
  - cffi>=1.17.1
  - pysoundfile>=0.12
  - librosa
  - pyarrow>=16
  # Hydra 3.5 uses pyvips/libvips for image loading/preprocessing.
  # Install through conda-forge so the libvips shared libraries/DLLs are included.
  - libvips
  - pyvips
  - pandas>=2.2
  - requests>=2.31
  - tqdm>=4.66
  - pyyaml>=6.0
  - fastapi>=0.110
  - uvicorn>=0.27
  - pydantic>=2.6
  - python-multipart>=0.0.9
  - orjson>=3.10
  - pytest>=8.0
  - httpx>=0.27
  - pip:
      - transformers>=4.57
      - huggingface_hub>=0.23
      - onnxruntime-gpu[cuda,cudnn]>=1.21,<1.23
      - accelerate>=0.30
      - timm>=1.0
      - safetensors>=0.4
      - sentencepiece>=0.2
      - selenium>=4.20
      - einops>=0.7
      - sounddevice>=0.4
      - "pyvips[binary]>=3.0.0"
      - pyvips-binary>=8.16.0
